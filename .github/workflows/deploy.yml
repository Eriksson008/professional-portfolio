name: Deploy to GitHub Pages

# Builds the Vite site and publishes dist/ to GitHub Pages on every push to main.
# Requires (one-time, in repo Settings → Pages): Source = "GitHub Actions".
# The repo must be public, or on a plan that allows Pages for private repos.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, mint the deploy id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a newer push finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Project site lives under /professional-portfolio/, so build with that base.
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /professional-portfolio/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
