<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ask Fredrik — Admin</title>
    <!-- Private admin panel: keep it out of search indexes entirely. In
         production this page is served by the Ask-Fredrik Worker itself
         (npm run build:admin) behind Cloudflare Access, and the Worker
         re-validates the Access identity on every API call. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <link rel="icon" href="%BASE_URL%admin-icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%admin-icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%admin-icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%admin-icons/apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%admin.webmanifest" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="%BASE_URL%admin-icons/icon-144.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="admin-root"></div>
    <script type="module" src="/src/admin/main.tsx"></script>
  </body>
</html>
